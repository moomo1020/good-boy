<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>乖小孩提案 - 網站練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Noto Sans TC", sans-serif;
  background: #90DDE9;
  color: #f8fcff;
  line-height: 1.8;
}

.back-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: #f8fcff;
  text-decoration: none;
  border-radius: 4px;
  z-index: 100;
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.3);
}

.header {
  background: rgba(255, 255, 255, 0.2);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  padding: 20px 40px;
}

.header h1 {
  font-size: 24px;
  font-weight: 700;
}

.layout {
  display: flex;
  max-width: 1920px;
  margin: 0 auto;
  min-height: calc(100vh - 65px);
}

.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.1);
  border-right: 1px solid rgba(255, 255, 255, 0.2);
  padding: 32px 24px;
  position: sticky;
  top: 0;
  align-self: flex-start;
  min-height: calc(100vh - 65px);
}

.sidebar-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  opacity: 0.7;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.sidebar a {
  display: block;
  color: #f8fcff;
  text-decoration: none;
  padding: 16px 20px;
  margin-bottom: 8px;
  border-radius: 6px;
  font-size: 18px;
  font-weight: 500;
  transition: background 0.2s;
}

.sidebar a:hover,
.sidebar a.active {
  background: rgba(255, 255, 255, 0.2);
}

.sidebar .frame-link {
  margin-top: 24px;
  border-top: 1px solid rgba(255, 255, 255, 0.2);
  padding-top: 24px;
}

.content {
  flex: 1;
  padding: 40px 60px;
  max-width: calc(1920px - 280px);
}

.content h2 {
  font-size: 28px;
  margin: 60px 0 24px;
  font-weight: 800;
}

.content h2:first-child {
  margin-top: 0;
}

.content p {
  margin-bottom: 16px;
  font-size: 16px;
}

.main-title {
  text-align: center;
  font-size: 48px;
  font-weight: 900;
  margin: 20px 0 48px;
}

.image-container {
  text-align: center;
  margin: 32px 0;
}

.image-container img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
}

.video-section {
  margin: 32px 0;
}

.yt-embed {
  max-width: 960px;
  margin: 24px auto;
  text-align: center;
}

.yt-embed iframe {
  width: 100%;
  max-width: 960px;
  height: 540px;
  border: none;
  border-radius: 8px;
  background: #000;
  display: block;
  margin: 0 auto;
}

@media (max-width: 768px) {
  .yt-embed iframe {
    height: 220px;
  }
}

@media (max-width: 1200px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    position: static;
    min-height: auto;
    border-right: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 20px;
  }

  .sidebar-title {
    width: 100%;
  }

  .sidebar a {
    font-size: 15px;
    padding: 12px 16px;
    margin-bottom: 0;
  }

  .sidebar .frame-link {
    width: 100%;
    margin-top: 12px;
    padding-top: 12px;
  }

  .content {
    padding: 32px 24px;
    max-width: 100%;
  }

  .main-title {
    font-size: 36px;
  }
}
</style>
</head>
<body>
<script>
if (location.protocol === 'file:') {
  document.write('<div style="background:#c0392b;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif;font-size:14px;">您正在用本機檔案直接開啟，YouTube 無法播放。請雙擊「啟動本機預覽.bat」，再用 <strong>http://localhost:8080/work.html</strong> 開啟。</div>');
}
</script>
<a href="index.html" class="back-btn">返回首頁</a>
<script src="home-link.js"></script>

<div class="header">
  <h1>乖小孩提案</h1>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-title">書籤導覽</div>
    <a href="#intro">遊戲介紹</a>
    <a href="#concept">我們的理念</a>
    <a href="#youtube">youtube參考</a>
    <a href="#exhibition-video">展場影片</a>
    <a href="frame.html" class="frame-link">框架頁</a>
  </nav>

  <main class="content">
    <h1 class="main-title">乖小孩提案</h1>

    <div class="image-container">
      <img src="work/1 - 1.PNG" alt="乖小孩提案">
    </div>

    <section id="intro">
      <h2>遊戲介紹</h2>
      <p>為了成為最乖的好孩子，努力完成任務吧！</p>
      <div class="image-container">
        <img src="work/1 - 1.PNG" alt="遊戲介紹">
      </div>
    </section>

    <section id="concept">
      <h2>我們的理念</h2>
      <p>我發想這款遊戲，希望可以透過可愛又搞笑荒謬的呈現方式，引起人們的共鳴，藉此促進家庭之間的溝通橋樑，同時不管是家人還是朋友都可以一起同樂這款遊戲。</p>
    </section>

    <section id="youtube">
      <h2>youtube參考</h2>
      <div class="yt-embed">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/RSyoMsWRL9I?si=KELItCvkYauPPlf4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <p>參考Nintendo of America的遊戲製作</p>
    </section>

    <section id="exhibition-video">
      <h2>展場影片</h2>
      <div class="yt-embed">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/uLVe3DZEMkY?si=8N5XMbMAcpyH4x67" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <p>此區域可直接在網頁上觀賞展場 YouTube 影片。</p>
    </section>
  </main>
</div>

<script>
document.querySelectorAll('.sidebar a[href^="#"]').forEach(function (anchor) {
  anchor.addEventListener('click', function (e) {
    e.preventDefault();
    var target = document.querySelector(this.getAttribute('href'));
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});
</script>
</body>
</html>
